<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f3eefb;
    color: #111;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 32px 64px;
  }

  height: 216px;

}

}
      
  .logo { font-size: 22px; font-weight: 800; }
  .header-right { font-size: 15px; color: #555; }
  .header-right a {
    color: #4f2dd1;
    font-weight: 600;
    text-decoration: none;
    margin-left: 8px;
  }

  /* Layout */
  .container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 64px 80px;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }

  /* Card */
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 48px;
    box-shadow: 0 10px 40px rgba(79, 45, 209, 0.08);
    width: 100%;
    max-width: 400px;
  }
  .card h2 {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .card .subtitle {
    color: #666;
    font-size: 15px;
    margin-bottom: 28px;
  }

  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #4f2dd1;
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: #ebe3f7;
    border: none;
    border-radius: 999px;
    padding: 14px 20px;
    font-size: 15px;
    outline: none;
  }
  .field input::placeholder { color: #aaa; }

  .terms {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: #555;
    margin-bottom: 22px;
  }
  .terms a { color: #4f2dd1; font-weight: 600; text-decoration: none; }

  .submit {
    width: 100%;
    background: #4f2dd1;
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 18px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .submit:hover { background: #3f23a8; }

  /* Footer */
  footer {
    border-top: 1px solid #e5dcf3;
    padding: 24px 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    color: #666;
    flex-wrap: wrap;
    gap: 16px;
  }
  footer .links { display: flex; gap: 32px; }
  footer .links a { color: #555; text-decoration: none; }

  @media (max-width: 900px) {
    .container { padding: 24px; }
    header, footer { padding: 24px; }
    .card { padding: 32px 24px; }
  }
</style>
</head>
<body>
  <header>
    <div class="logo1">cvFlow</div>
    <div class="header-right">Already have an account? <a href="login.html">Sign In</a></div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Create your account</h2>
      <p class="subtitle">Start your journey with free trial. No credit card required.</p>

      <form action="signup.php" method="post">
        <div class="field">
          <label>Nom</label>
          <input type="text" name="nom" placeholder="Alex Rivera" required />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" placeholder="alex@company.com" required />
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" name="mot_de_passe" placeholder="••••••••" required />
        </div>

        <button class="submit" type="submit">Create Account</button>
      </form>
    </section>
  </main>

  <footer>
    <div class="logo">CVFlow</div>
    <div class="links">
      <a href="#">Imen Othmen </a>

      <a href="#">Hadil Rjeb</a>
      <a href="#">Rahma Chouaieb</a>

  </footer>
